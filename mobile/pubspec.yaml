name: greenova
description: Smart sustainable product recommendations app with AI-powered sustainability reports and carbon footprint tracking.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Networking
  dio: ^5.4.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Camera & Scanning (disabled for web - enable for mobile)
  # mobile_scanner: ^4.0.1
  # camera: ^0.10.5+9
  # image_picker: ^1.0.7
  # google_mlkit_text_recognition: ^0.11.0

  # Charts & Visualization
  fl_chart: ^0.66.0

  # Animations
  lottie: ^3.0.0

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Utilities
  uuid: ^4.3.1
  intl: ^0.19.0
  permission_handler: ^11.2.0
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.2

  # Data Classes
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
